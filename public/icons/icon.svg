<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Left wheel -->
  <circle cx="152" cy="316" r="80" fill="none" stroke="#48fd00" stroke-width="24"/>
  <!-- Right wheel -->
  <circle cx="360" cy="316" r="80" fill="none" stroke="#48fd00" stroke-width="24"/>
  <!-- Bottom bracket -->
